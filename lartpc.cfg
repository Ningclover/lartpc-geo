##############################################################################
# LArTPC Optical Geometry Configuration
#
# Geometry hierarchy:
#
#   World (vacuum, 12m x 12m x 12m)
#   └── Detector (liquid argon, 10m x 10m x 10m)
#         ├── WallTop / WallBottom  : total absorption (glisur, dielectric_metal, R=0)
#         ├── WallPosX/NegX/PosY/NegY : ground diffuse (unified, dielectric_metal, ground)
#         └── Cathode (LiquidArgon, 9.8m x 9.8m x 2cm) at z=0
#               Material = LiquidArgon: no boundary, fully transparent
#               └── PhotonSensor x25  (LiquidArgon, 0.5m x 0.5m x 1cm)
#                     5x5 grid, uniformly distributed
#                     No optical surface: same material as LAr world, photons enter freely
#                     Detection via SensDet ProcessHits with QE applied in software
#                     SensDet: "PhotonDetector"
##############################################################################

# ---------------------------------------------------------------------------
# World -- outermost vacuum envelope
# ---------------------------------------------------------------------------
[World]
class       = lartpc.World.Builder
subbuilders = ["Detector"]
material    = "Vacuum"
dx          = Q("6m")
dy          = Q("6m")
dz          = Q("6m")

# ---------------------------------------------------------------------------
# Detector -- 10 m x 10 m x 10 m liquid argon box
# Six 1-mm wall slabs line the interior:
#   top / bottom   : total absorption (glisur, dielectric_metal, polished, R=0)
#   four side walls: diffuse ground   (unified, dielectric_metal, ground, R=wall_r_side)
# ---------------------------------------------------------------------------
[Detector]
class         = lartpc.Detector.Builder
subbuilders   = ["Cathode"]
material      = "LiquidArgon"
dx            = Q("5m")
dy            = Q("5m")
dz            = Q("5m")
wall_r_side   = "0.9"

# ---------------------------------------------------------------------------
# Cathode -- 10 m x 10 m x 1 cm plane at the xy mid-plane (z=0)
# Material: LiquidArgon -- no optical boundary, photons pass through freely.
# Contains a 5 x 5 grid of photon sensors
# ---------------------------------------------------------------------------
[Cathode]
class       = lartpc.Cathode.Builder
subbuilders = ["PhotonSensor"]
material    = "LiquidArgon"
dx          = Q("4.9m")
dy          = Q("4.9m")
dz          = Q("1cm")
nx          = 5
ny          = 5

# ---------------------------------------------------------------------------
# PhotonSensor -- single tile: 0.5 m x 0.5 m x 1 cm
# Material: SensorMaterial (silicon-like, n=1.7 at 128 nm).
#   A real optical boundary exists at the LAr/SensorMaterial interface,
#   which is required for G4OpBoundaryProcess to call the SurfaceSD.
# SurfaceDetector: registered with edep-sim's EDepSim::SurfaceSD, which
#   records each photon that crosses the boundary as a TG4PhotonHit.
#   Requires /process/optical/boundary/setInvokeSD true in the run macro.
# ---------------------------------------------------------------------------
[PhotonSensor]
class            = lartpc.PhotonSensor.Builder
material         = "SensorMaterial"
dx               = Q("25cm")
dy               = Q("25cm")
dz               = Q("0.5cm")
SurfaceDetector  = "PhotonDetector"
